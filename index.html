<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KOATAJ | Calculateur</title>
    
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f5f5f7;
            --accent: #0071e3;
            --text: #1d1d1f;
            --text-sec: #86868b;
            --radius: 16px;
            --grad: linear-gradient(135deg, #0071e3 0%, #00f2ff 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 400px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 25px; }
        .brand { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        h1 { font-size: 1.6rem; margin: 5px 0; font-weight: 600; }

        .section-title { font-size: 0.7rem; font-weight: 800; color: var(--text-sec); margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1.2px; }

        .card { background: var(--card-bg); padding: 18px; border-radius: var(--radius); margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03); }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-group { margin-bottom: 0px; }
        label { display: block; font-size: 0.6rem; font-weight: 700; color: var(--text-sec); margin-bottom: 6px; text-transform: uppercase; }
        
        .field { position: relative; display: flex; align-items: center; }
        .field svg { position: absolute; left: 12px; width: 14px; color: var(--accent); opacity: 0.8; }
        
        input {
            width: 100%; padding: 12px 10px 12px 35px; border: 1px solid #d2d2d7;
            border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.2s; background: white; box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }

        button {
            width: 100%; padding: 20px; background: var(--grad); color: white;
            border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 8px 15px rgba(0,113,227,0.2); margin-top: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .results { margin-top: 25px; display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .res-item { background: white; border: 1px solid #d2d2d7; padding: 15px; border-radius: 12px; }
        .res-item.total { grid-column: span 2; background: var(--grad); color: white; border: none; margin-top: 5px; }
        .res-label { font-size: 0.55rem; text-transform: uppercase; font-weight: 800; opacity: 0.8; margin-bottom: 4px; }
        .res-val { font-size: 1.2rem; font-weight: 700; }
        .unit { font-size: 0.75rem; font-weight: 400; margin-left: 3px; opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="brand">Atelier KOATAJ</span>
        <h1>Calculateur</h1>
    </header>

    <div class="section-title">Dimensions Mur</div>
    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label>Largeur (cm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h8m-8 10h8m-8-5h8" stroke-width="2.5"/></svg>
                    <input type="number" id="wallW" value="300">
                </div>
            </div>
            <div class="input-group">
                <label>Hauteur (cm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 8v8m10-8v8m-5-8v8" stroke-width="2.5"/></svg>
                    <input type="number" id="wallH" value="362">
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>Profondeur Max (cm)</label>
            <div class="field">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 17l5-5-5-5" stroke-width="2.5"/></svg>
                <input type="number" id="maxD" value="14">
            </div>
        </div>
    </div>

    <div class="section-title">Stock Matière (Planche)</div>
    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label>Long. Planche (cm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" stroke-width="2.5"/></svg>
                    <input type="number" id="boardW" value="280">
                </div>
            </div>
            <div class="input-group">
                <label>Larg. Planche (cm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" stroke-width="2.5"/></svg>
                    <input type="number" id="boardH" value="190">
                </div>
            </div>
        </div>
    </div>

    <div class="section-title">Réglages Design</div>
    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label>Ép. MDF (mm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" stroke-width="2.5"/></svg>
                    <input type="number" id="mdfThick" value="12">
                </div>
            </div>
            <div class="input-group">
                <label>Espace (mm)</label>
                <div class="field">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01" stroke-width="2.5"/></svg>
                    <input type="number" id="spacing" value="20">
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>Prix Unitaire (MAD)</label>
            <div class="field">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.6 0-3 1.3-3 3s1.3 3 3 3 3 1.3 3 3-1.3 3-3 3" stroke-width="2.5"/></svg>
                <input type="number" id="unitPrice" value="450">
            </div>
        </div>
    </div>

    <button onclick="calculate()">Calculer l'Atelier</button>

    <div class="results" id="resBox">
        <div class="res-grid">
            <div class="res-item"><div class="res-label">Nombre Lattes</div><div class="res-val" id="resLattes">0</div></div>
            <div class="res-item"><div class="res-label">Surface MDF</div><div class="res-val" id="resSurf">0<span class="unit">m²</span></div></div>
            <div class="res-item"><div class="res-label">Planches Requis</div><div class="res-val" id="resPanels">0</div></div>
            <div class="res-item"><div class="res-label">Optimisation</div><div class="res-val">15<span class="unit">% loss</span></div></div>
            <div class="res-item total"><div class="res-label">Budget Matière (Estimation)</div><div class="res-val" id="resTotal">0 MAD</div></div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const wallW = parseFloat(document.getElementById('wallW').value);
        const wallH = parseFloat(document.getElementById('wallH').value) / 100;
        const maxD = parseFloat(document.getElementById('maxD').value) / 100;
        
        const bW = parseFloat(document.getElementById('boardW').value);
        const bH = parseFloat(document.getElementById('boardH').value);
        const boardArea = (bW * bH) / 10000; // Conversion cm2 vers m2

        const mdf = parseFloat(document.getElementById('mdfThick').value);
        const space = parseFloat(document.getElementById('spacing').value);
        const price = parseFloat(document.getElementById('unitPrice').value);

        // Calcul Lattes
        const entraxeCm = (mdf + space) / 10;
        const nbLattes = Math.ceil(wallW / entraxeCm);

        // Calcul Surfaces
        const surfUneLatte = wallH * maxD;
        const surfTotale = nbLattes * surfUneLatte;

        // Calcul Planches avec les dimensions dynamiques
        const nbPlanches = Math.ceil((surfTotale / boardArea) * 1.15);
        
        document.getElementById('resLattes').innerText = nbLattes;
        document.getElementById('resSurf').innerText = surfTotale.toFixed(2);
        document.getElementById('resPanels').innerText = nbPlanches;
        document.getElementById('resTotal').innerText = (nbPlanches * price).toLocaleString() + " MAD";
        
        document.getElementById('resBox').style.display = 'block';
    }
</script>

</body>
</html>
