<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KOATAJ | Calculateur</title>
    
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f5f5f7;
            --accent: #0071e3;
            --text: #1d1d1f;
            --text-sec: #86868b;
            --radius: 16px;
            --grad: linear-gradient(135deg, #0071e3 0%, #00f2ff 100%);
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 400px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; }
        .brand { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        h1 { font-size: 1.6rem; margin: 5px 0; font-weight: 600; }

        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); margin-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-sec); margin-bottom: 5px; text-transform: uppercase; }
        
        .field { position: relative; display: flex; align-items: center; }
        .field svg { position: absolute; left: 12px; width: 16px; color: var(--accent); }
        
        input {
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #d2d2d7;
            border-radius: 10px; font-size: 1rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.1); }

        button {
            width: 100%; padding: 18px; background: var(--grad); color: white;
            border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,113,227,0.15);
        }

        .results { margin-top: 30px; display: none; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .res-item { background: white; border: 1px solid #d2d2d7; padding: 15px; border-radius: 12px; }
        .res-item.total { grid-column: span 2; background: var(--grad); color: white; border: none; }
        .res-label { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
        .res-val { font-size: 1.3rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="brand">Atelier KOATAJ</span>
        <h1>Calculateur</h1>
    </header>

    <div class="card">
        <div class="input-group">
            <label>Largeur Mur (cm)</label>
            <div class="field">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h8m-8 10h8m-8-5h8" stroke-width="2"/></svg>
                <input type="number" id="w" value="300">
            </div>
        </div>
        <div class="input-group">
            <label>Hauteur Mur (cm)</label>
            <div class="field">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 8v8m10-8v8m-5-8v8" stroke-width="2"/></svg>
                <input type="number" id="h" value="362">
            </div>
        </div>
        <div class="input-group">
            <label>Profondeur Max (cm)</label>
            <div class="field">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 17l5-5-5-5" stroke-width="2"/></svg>
                <input type="number" id="d" value="14">
            </div>
        </div>
    </div>

    <div class="card">
        <label>Prix Panneau (MAD)</label>
        <div class="field">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.6 0-3 1.3-3 3s1.3 3 3 3 3 1.3 3 3-1.3 3-3 3" stroke-width="2"/></svg>
            <input type="number" id="price" value="450">
        </div>
    </div>

    <button onclick="calc()">GÉNÉRER L'ESTIMATION</button>

    <div class="results" id="res">
        <div class="res-grid">
            <div class="res-item"><div class="res-label">Lattes</div><div class="res-val" id="rl">0</div></div>
            <div class="res-item"><div class="res-label">MDF (Unités)</div><div class="res-val" id="rp">0</div></div>
            <div class="res-item total"><div class="res-label">Budget Estimé</div><div class="res-val" id="rt">0 MAD</div></div>
        </div>
    </div>
</div>

<script>
    function calc() {
        const w = parseFloat(document.getElementById('w').value);
        const h = parseFloat(document.getElementById('h').value)/100;
        const d = parseFloat(document.getElementById('d').value)/100;
        const p = parseFloat(document.getElementById('price').value);

        const nb = Math.ceil(w / 3.2); // Basé sur ton entraxe de 32mm
        const surf = nb * (h * d);
        const panels = Math.ceil((surf / 5.32) * 1.15); // +15% nesting
        
        document.getElementById('rl').innerText = nb;
        document.getElementById('rp').innerText = panels;
        document.getElementById('rt').innerText = (panels * p).toLocaleString() + " MAD";
        document.getElementById('res').style.display = 'block';
    }
</script>

</body>
</html>
